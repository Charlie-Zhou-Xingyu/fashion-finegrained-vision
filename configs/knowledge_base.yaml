- id: preferred_material_001
  category: material
  term: Preferred Material
  zh_term: 优选材料
  aliases:
  - preferred material
  - 优选材料
  - 优选纤维
  - preferred fiber
  title: 优选材料（Preferred Material）
  content: '纺织交易所将优选纤维或材料定义为与常规生产相比，在环境和/或社会 可持续性成果和影响方面有所改善的材料。优选材料包括优选可再生材料和 优选再生材料。评估标准涵盖原料生产、加工、产品完整性和科学验证。 具体的优选材料清单可能随行业标准和认证体系的更新而变化。

    '
