- id: material_term_001
  category: material
  term: Material
  zh_term: 材料
  aliases:
  - material
  - 材料
  - 纺织材料
  - 服装材料
  title: 材料（Material）
  content: '材料是用于制造纺织品的特定物质。在纺织行业中，"材料"一词可作为纤维 和非纤维材料的统称。纺织交易所将材料定义为可转化为纱线的纤维，或通过 其他生产工艺达到可加工状态的非纤维材料。初级加工可能包括轧棉、制浆、 碎料、清洗、鞣制等步骤。

    '
  allowed_usage:
