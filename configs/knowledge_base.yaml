- id: fiber_term_001
  category: fiber
  term: Fiber
  zh_term: 纤维
  aliases:
  - fiber
  - 纤维
  - 纺织纤维
  - 纱线原料
  title: 纤维（Fiber）
  content: '纤维是转化为纱线（通常进一步织成面料和成品）的材料。纤维可分为短纤维 和长丝纤维两种。短纤维具有有限长度，如棉、羊毛等；长丝纤维理论上具有 无限长度，是连续纤维。在纺织品中，纤维是构成面料的基本单元。

    '
  allowed_usage:
