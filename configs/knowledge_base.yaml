- id: raw_materials_001
  category: material
  term: Raw materials
  zh_term: 原材料
  aliases:
  - raw materials
  - 原材料
  - 原料
  - 初级原料
  title: 原材料（Raw materials）
  content: '纺织行业使用的原材料可以是初级（原生）材料，也可以是从消费前或消费后 废物流中回收并重新投入生产循环的二级原料。原材料可分为可再生和不可 再生两类。原材料通常处于未加工或最低限度加工的状态。

    '
  allowed_usage:
