- id: plant_fibers_001
  category: fiber
  term: Plant-based fibers and materials
  zh_term: 植物基纤维与材料
  aliases:
  - plant-based fibers
  - 植物纤维
  - 植物基材料
  - 天然纤维
  title: 植物基纤维与材料（Plant-based fibers and materials）
  content: '植物基纤维和材料可分为常规可再生、优选可再生或回收再生三类。优选 可再生植物基材料以更可持续的方式种植或采收。包括田间种植的作物如 棉、亚麻（亚麻布）、大麻，或人工林/森林中的作物如乳胶（橡胶）， 以及野生植物如荨麻。植物基材料可来源于种子（棉）、茎（亚麻、大麻）、
    汁液（橡胶）或叶子（剑麻）。

    '
