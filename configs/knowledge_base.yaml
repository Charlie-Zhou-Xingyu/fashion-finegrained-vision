- id: mmcf_001
  category: fiber
  term: Manmade Cellulosic Fibers
  zh_term: 人造纤维素纤维
  aliases:
  - manmade cellulosic fibers
  - 人造纤维素纤维
  - 再生纤维素纤维
  - MMCF
  title: 人造纤维素纤维（Manmade Cellulosic Fibers）
  content: '人造纤维素纤维如粘胶、莫代尔、莱赛尔和醋酯纤维，主要来源于林业或 其他植物（如竹子），以及越来越多的来自废弃纤维素的回收原料。这类 纤维被视为可再生的（除非以不可持续的方式采伐）。它们通过工业纤维素 工艺从原料中制成。

    '
