- id: circularity_001
  category: sustainability
  term: Circularity
  zh_term: 循环性
  aliases:
  - circularity
  - 循环性
  - 循环经济
  - circular economy
  title: 循环性（Circularity）
  content: '循环经济是基于"设计消除"废物和污染、保持产品和材料在使用中、再生 自然系统的原则。在纺织行业中，循环性意味着从传统的"获取-制造-丢弃" 线性模式转向将废物视为资源的新模式，通过回收、再利用和可再生设计 减少对原生材料的依赖和对环境的压力。

    '
  allowed_usage:
  - knowledge_qa
  - explanation
  - internal_test
  risk_level: medium
  source: materials_terminology_guide_2020
  source_type: pdf
