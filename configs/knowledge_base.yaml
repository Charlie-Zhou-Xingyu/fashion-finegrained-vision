- id: synthetic_fibers_001
  category: fiber
  term: Synthetic fibers and materials
  zh_term: 合成纤维与材料
  aliases:
  - synthetic fibers
  - 合成纤维
  - 化纤
  - 化学纤维
  title: 合成纤维与材料（Synthetic fibers and materials）
  content: '合成纤维和材料可分为常规、回收和生物基三类。常规合成纤维（如原生 涤纶、锦纶和合成橡胶）以从地球开采的不可再生化石燃料为基础，通过 石化工艺制成。它们也可以来自消费后塑料废物，通过机械或化学回收制成 新的纺织合成材料。生物基合成材料则来源于玉米、甘蔗等植物。

    '
