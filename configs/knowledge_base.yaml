- id: nonfiber_term_001
  category: material
  term: Non-fiber
  zh_term: 非纤维材料
  aliases:
  - non-fiber
  - 非纤维
  - 非纤维材料
  title: 非纤维材料（Non-fiber）
  content: '非纤维材料指不转化为纱线，而是通过其他生产工艺（如羽绒的清洗和干燥、 皮革的鞣制、橡胶的生产）达到可加工状态的材料。这类材料可以直接成为 产品的组成部分。常见的非纤维材料包括皮革、羽绒和橡胶。

    '
  allowed_usage:
