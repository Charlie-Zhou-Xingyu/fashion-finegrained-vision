- id: animal_fibers_001
  category: fiber
  term: Animal-derived fibers and materials
  zh_term: 动物源纤维与材料
  aliases:
  - animal-derived fibers
  - 动物纤维
  - 动物源材料
  - 动物毛
  title: 动物源纤维与材料（Animal-derived fibers and materials）
  content: '动物源纤维和材料可分为常规可再生、优选可再生或回收再生三类。优选 可再生动物纤维/材料以更可持续的方式养殖。来源包括家养动物（如羊、 山羊、牛及部分水禽）和野生动物（如郊狼、负鼠、鳄鱼）的皮毛和毛发。 蚕丝也属于此类，可来自养殖或野生蚕。

    '
