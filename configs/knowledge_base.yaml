- id: recycled_materials_001
  category: material
  term: Recycled raw materials
  zh_term: 再生原材料
  aliases:
  - recycled raw materials
  - 再生原材料
  - 回收材料
  - 再生纤维
  - recycled
  - recycled material
  title: 再生原材料（Recycled raw materials）
  content: '再生原材料可来自可再生或不可再生原料，指原本会成为废物的材料，经过 收集、分离、加工后重新回到经济循环中，作为原材料或产品使用。再生材料 通常被认为属于材料可持续组合方案的一部分。

    '
