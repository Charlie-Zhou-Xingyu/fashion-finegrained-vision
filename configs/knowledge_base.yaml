- id: conventional_material_001
  category: material
  term: Conventional material
  zh_term: 常规材料
  aliases:
  - conventional material
  - 常规材料
  - 传统材料
  - 非优选材料
  title: 常规材料（Conventional material）
  content: '纺织交易所将常规材料定义为未按照可持续项目（标准、认证、法规、倡议 或流程）的规范生产的材料。与之对应，优选材料则经过特定的可持续性认证 或评估。常规生产并不意味着质量差，而是指在可持续性方面尚未达到行业 认可的更优标准。

    '
