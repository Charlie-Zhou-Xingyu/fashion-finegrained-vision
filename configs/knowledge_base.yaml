- id: nonrenewable_materials_001
  category: material
  term: Non-renewable raw materials
  zh_term: 不可再生原材料
  aliases:
  - non-renewable raw materials
  - 不可再生原材料
  - 不可再生资源
  - 有限资源
  title: 不可再生原材料（Non-renewable raw materials）
  content: '不可再生原材料又称有限资源，指无法以与消耗速度相匹配的方式自然再生的 自然资源。例如碳基化石燃料（传统合成纤维和材料的基础原料）。地球矿物、 金属矿石及特定含水层中的地下水也是不可再生资源。

    '
