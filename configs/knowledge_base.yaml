- id: cotton_001
  category: fiber
  term: Cotton
  zh_term: 棉
  aliases:
  - cotton
  - 棉
  - 棉花
  - 纯棉
  - 全棉
  title: 棉（Cotton）
  content: '棉是纺织行业中使用最广泛的天然纤维之一，来源于棉属植物的种子纤维。 棉属于植物基纤维，可分为常规棉和多种优选棉（如有机棉、公平贸易棉、 再生棉等）。纺织交易所的 CFMB 项目中包含专门的棉模块，涵盖有机棉、 Better
    Cotton Initiative (BCI)、非洲产棉 (CmiA) 等多个可持续发展项目。 棉纤维为短纤维，具有良好的吸湿性和透气性，适用于各类服装。

    '
