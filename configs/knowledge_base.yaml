- id: renewable_materials_001
  category: material
  term: Renewable raw materials
  zh_term: 可再生原材料
  aliases:
  - renewable raw materials
  - 可再生原材料
  - 可再生材料
  - 可再生资源
  title: 可再生原材料（Renewable raw materials）
  content: '可再生原材料指使用时通常不会耗尽的资源。快速可再生材料通常来自生长 迅速的来源，在十年或更短时间内即可生长或培育并收获。例如棉、羊毛及 用于制造人造纤维素纤维的特定木材。可再生材料可以通过可持续项目生产， 也可以采用常规方式生产。

    '
